components:
  schemas:
    BaseModel:
      title: BaseModel
      x-stoplight:
        id: 7s3ud4syrv0ys
      type: object
      description: Base model to be combined with all other models
      x-internal: true
      properties:
        id:
          type:
            - integer
          format: int64
          description: Autogenerated ID from the database.
          readOnly: true
        created:
          type: string
          format: date-time
          description: Datetime the model was created
        created_by:
          type: string
          description: Username the model was created by
        updated:
          type: string
          format: date-time
          description: Datetime the model was updated
        updated_by:
          type: string
          description: Username the model was updated by
      required:
        - id
        - created
        - updated
    User:
      allOf:
        - $ref: '#/components/schemas/BaseModel'
        - type: object
          properties:
            username:
              type: string
              maxLength: 255
              pattern: '^[A-Za-z0-9_-]+'
            password:
              type: string
              maxLength: 255
              format: password
            aesKey:
              type: string
              format: byte
            rsaPublicKey:
              type: string
              format: byte
            rsaKeyPair:
              type: string
              format: byte
            firstName:
              type: string
              maxLength: 255
              pattern: '^[A-Za-z0-9 -]+'
            lastName:
              type: string
              maxLength: 255
              pattern: '^[A-Za-z0-9 -]+'
            email:
              type: string
              maxLength: 255
              format: email
            emailVerified:
              type: boolean
              default: false
            accountLocked:
              type: boolean
              default: true
            groups:
              type: array
              items:
                $ref: '#/components/schemas/Group'
          required:
            - username
            - password
            - aesKey
            - emailVerified
            - accountLocked
    Location:
      allOf:
        - $ref: '#/components/schemas/BaseModel'
        - type: object
          properties:
            name:
              type: string
              maxLength: 255
              pattern: '^[A-Za-z0-9 _.#-]+'
            description:
              type: string
              maxLength: 255
            address1:
              type: string
              maxLength: 255
              pattern: '^[A-Za-z0-9 _.#-]+'
            address2:
              type: string
              maxLength: 255
              pattern: '^[A-Za-z0-9 _.#-]+'
            city:
              type: string
              maxLength: 64
              pattern: '^[A-Za-z0-9-_.]+'
            state:
              type: string
              maxLength: 2
              pattern: '^[A-Za-z ]+'
            zip:
              type: string
              maxLength: 12
              pattern: '^[A-Za-z0-9-]+'
            parent:
              $ref: '#/components/schemas/Location'
          required:
            - name
    Client:
      allOf:
        - $ref: '#/components/schemas/BaseModel'
        - type: object
          properties:
            name:
              type: string
              maxLength: 255
              pattern: '^[A-Za-z0-9 _.#-]+'
            locations:
              type: array
              items:
                $ref: '#/components/schemas/Location'
          required:
            - name
    Group:
      allOf:
        - $ref: '#/components/schemas/BaseModel'
        - type: object
          properties:
            name:
              type: string
              maxLength: 255
              pattern: '^[A-Za-z0-9 _.#-]+'
            description:
              type: string
              maxLength: 255
          required:
            - name
  securitySchemes:
    access_token:
      name: API Key
      type: apiKey
      in: cookie
tags:
  - name: authentication
  - name: client
  - name: group
  - name: location
  - name: user
security:
  - access_token: []
