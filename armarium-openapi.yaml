openapi: 3.1.0
x-stoplight:
  id: ghx7kwq17g852
info:
  title: armarium
  version: '1.0'
  license:
    identifier: BSD-2-Clause
    name: BSD
  description: Interface to the Armarium Documentation Server API
  contact:
    name: Nicholas Pepper
servers:
  - url: /api/v1
    description: Same origin server
paths:
  /token:
    post:
      summary: ''
      operationId: post-token
      responses:
        '200':
          description: OK
        '404':
          description: Not Found
      description: Authorization endopoint for acquiring the JWT token
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                username:
                  type: string
                  maxLength: 255
                  pattern: '^[A-Za-z_-]+'
                password:
                  type: string
                  maxLength: 255
                  format: password
      parameters: []
      tags:
        - authentication
      security: []
  /users:
    get:
      summary: Get all users
      tags:
        - location
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  result:
                    type: string
                    enum:
                      - error
                      - success
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                required:
                  - result
        '401':
          description: Unauthorized
      operationId: get-users
      description: Gets a list of all of the users on the server.
      parameters:
        - schema:
            type: integer
          in: query
          name: page
          description: The page of results to return based on the limit.
        - schema:
            type: integer
            maximum: 1000
            default: 500
          in: query
          name: limit
          description: The number of entries to return in a single query.
    parameters: []
  /user:
    post:
      summary: Create New User
      operationId: post-user
      responses:
        '200':
          description: User Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  result:
                    type: string
                    enum:
                      - error
                      - success
                  data:
                    $ref: '#/components/schemas/User'
        '400':
          description: Required information missing.
        '401':
          description: Unauthorized
        '409':
          description: Username already taken
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
        description: Post the necessary fields for the API to create a new user.
      description: Create a new user.
      tags:
        - user
  '/user/{userId}':
    parameters:
      - schema:
          type: string
        name: userId
        in: path
        required: true
        description: Username of an existing user
    get:
      summary: Get User Info by User ID
      tags:
        - user
      responses:
        '200':
          description: User Found
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  result:
                    type: string
                    enum:
                      - error
                      - success
                  data:
                    $ref: '#/components/schemas/User'
                required:
                  - result
        '401':
          description: Unauthorized
        '404':
          description: User Not Found
      operationId: get-user-userId
      description: Retrieve the information of the user with the matching user ID.
    patch:
      summary: Update User Information
      operationId: patch-users-userId
      responses:
        '200':
          description: User Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  result:
                    type: string
                    enum:
                      - error
                      - success
                  data:
                    $ref: '#/components/schemas/User'
              examples: {}
        '401':
          description: Unauthorized
        '404':
          description: User Not Found
      description: Update the information of an existing user.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                password:
                  type: string
                  format: password
                aesKey:
                  type: string
                  format: byte
                rsaPublicKey:
                  type: string
                  format: byte
                rsaPrivateKey:
                  type: string
                  format: byte
                firstName:
                  type: string
                  maxLength: 255
                lastName:
                  type: string
                  maxLength: 255
                email:
                  type: string
                  format: email
                accountLocked:
                  type: boolean
            examples: {}
        description: Patch user properties to update.
      tags:
        - user
  /clients:
    get:
      summary: Your GET endpoint
      tags:
        - client
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  result:
                    type: string
                    enum:
                      - error
                      - success
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Client'
                required:
                  - result
        '401':
          description: Unauthorized
      operationId: get-clients
      description: Gets a list of all of the clients on the server.
      parameters:
        - schema:
            type: integer
          in: query
          name: page
          description: The page of results to return based on the limit.
        - schema:
            type: integer
            maximum: 1000
            default: 500
          in: query
          name: limit
          description: The number of entries to return in a single query.
    parameters: []
  /client:
    post:
      summary: Create New Client
      operationId: post-client
      responses:
        '200':
          description: Client Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  result:
                    type: string
                    enum:
                      - error
                      - success
                  data:
                    $ref: '#/components/schemas/Client'
                required:
                  - result
        '400':
          description: Required information missing.
        '401':
          description: Unauthorized
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Client'
        description: Post the necessary fields for the API to create a new client.
      description: Create a new user.
      tags:
        - client
    parameters: []
  '/client/{clientId}':
    parameters:
      - schema:
          type: string
        name: clientId
        in: path
        required: true
    get:
      summary: Get User Info by User ID
      responses:
        '200':
          description: User Found
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  result:
                    type: string
                    enum:
                      - error
                      - success
                  data:
                    $ref: '#/components/schemas/Client'
                required:
                  - result
        '401':
          description: Unauthorized
        '404':
          description: User Not Found
      operationId: get-client-clientId
      description: Retrieve the information of the user with the matching user ID.
      tags:
        - client
    patch:
      summary: Update User Information
      operationId: patch-client-clientId
      responses:
        '200':
          description: User Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  result:
                    type: string
                  data:
                    $ref: '#/components/schemas/Client'
              examples: {}
        '401':
          description: Unauthorized
        '404':
          description: User Not Found
      description: Update the information of an existing user.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 255
        description: Patch user properties to update.
      tags:
        - user
  /locations:
    get:
      summary: Get all locations
      tags:
        - location
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  result:
                    type: string
                    enum:
                      - error
                      - success
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Location'
                required:
                  - result
        '401':
          description: Unauthorized
      operationId: get-locations
      description: Gets a list of all of the locations on the server.
      parameters:
        - schema:
            type: integer
          in: query
          name: page
          description: The page of results to return based on the limit.
        - schema:
            type: integer
            maximum: 1000
            default: 500
          in: query
          name: limit
          description: The number of entries to return in a single query.
    parameters: []
  '/locations/client/{client_id}':
    parameters:
      - schema:
          type: string
        name: client_id
        in: path
        required: true
    get:
      summary: Get Location by Client ID
      tags:
        - location
      responses:
        '200':
          description: Locations found
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  result:
                    type: string
                    enum:
                      - error
                      - success
                  client:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Location'
                  parents:
                    type: array
                    items:
                      $ref: '#/components/schemas/Location'
                required:
                  - result
        '401':
          description: Unauthorized
        '404':
          description: Location Not Found
      operationId: get-location-clientId
      description: Retrieve the locations for a particular client.
  '/locations/parent/{parent_id}':
    parameters:
      - schema:
          type: string
        name: parent_id
        in: path
        required: true
    get:
      summary: Get Location by Parent Location ID
      tags:
        - location
      responses:
        '200':
          description: Locations found
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  result:
                    type: string
                    enum:
                      - error
                      - success
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Location'
                  parents:
                    type: array
                    items:
                      $ref: '#/components/schemas/Location'
                required:
                  - result
        '401':
          description: Unauthorized
        '404':
          description: Location Not Found
      operationId: get-location-parentId
      description: Retrieve the locations that are sub-locations to the parent ID.
  /location:
    post:
      summary: Create New Location
      operationId: post-location
      responses:
        '200':
          description: Location Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Location'
        '400':
          description: Required information missing.
        '401':
          description: Unauthorized
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocationNew'
        description: Post the necessary fields for the API to create a new location.
      description: Create a new location.
      tags:
        - location
    parameters: []
  '/location/{locationId}':
    parameters:
      - schema:
          type: string
        name: locationId
        in: path
        required: true
        description: ID of an existing location
    get:
      summary: Get Location by Location ID
      tags:
        - location
      responses:
        '200':
          description: Location Found
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  result:
                    type: string
                    enum:
                      - error
                      - success
                  data:
                    $ref: '#/components/schemas/Location'
                required:
                  - result
        '401':
          description: Unauthorized
        '404':
          description: Location Not Found
      operationId: get-location-locationId
      description: Retrieve the information of the location with the matching location ID.
    patch:
      summary: Update Location Information
      operationId: patch-location-locationId
      responses:
        '200':
          description: Location Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  result:
                    type: string
                    enum:
                      - error
                      - success
                  data:
                    $ref: '#/components/schemas/Location'
              examples: {}
        '401':
          description: Unauthorized
        '404':
          description: Location Not Found
      description: Update the information of an existing location.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 255
                address1:
                  type: string
                  maxLength: 255
                address2:
                  type: string
                  maxLength: 255
                city:
                  type: string
                  maxLength: 64
                state:
                  type: string
                  maxLength: 2
                zip:
                  type: string
                  maxLength: 12
                parent:
                  $ref: '#/components/schemas/Location'
            examples: {}
      tags:
        - location
  /groups:
    get:
      summary: Get all groups
      tags:
        - group
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  result:
                    type: string
                    enum:
                      - error
                      - success
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Group'
                required:
                  - result
        '401':
          description: Unauthorized
      operationId: get-groups
      description: Gets a list of all of the security groups on the server.
      parameters:
        - schema:
            type: integer
          in: query
          name: page
          description: The page of results to return based on the limit.
        - schema:
            type: integer
            maximum: 1000
            default: 500
          in: query
          name: limit
          description: The number of entries to return in a single query.
    parameters: []
  /group:
    post:
      summary: Create New Group
      operationId: post-group
      responses:
        '200':
          description: Group Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  result:
                    type: string
                    enum:
                      - error
                      - success
                  data:
                    $ref: '#/components/schemas/Group'
                required:
                  - result
        '400':
          description: Required information missing.
        '401':
          description: Unauthorized
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Group'
        description: Post the necessary fields for the API to create a new group.
      description: Create a new group.
      tags:
        - group
    parameters: []
  '/group/{groupId}':
    parameters:
      - schema:
          type: string
        name: groupId
        in: path
        required: true
        description: ID of an existing group
    get:
      summary: Get Group by Group ID
      tags:
        - group
      responses:
        '200':
          description: Group Found
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  result:
                    type: string
                    enum:
                      - error
                      - success
                  data:
                    $ref: '#/components/schemas/Group'
                required:
                  - result
        '401':
          description: Unauthorized
        '404':
          description: Group Not Found
      operationId: get-group-groupId
      description: Retrieve the information of the group with the matching group ID.
    patch:
      summary: Update Group Information
      operationId: patch-group-groupId
      responses:
        '200':
          description: Group Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  result:
                    type: string
                    enum:
                      - error
                      - success
                  data:
                    $ref: '#/components/schemas/Group'
              examples: {}
        '401':
          description: Unauthorized
        '404':
          description: Group Not Found
      description: Update the information of an existing group.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 255
        description: Patch group properties to update.
      tags:
        - group
components:
  schemas:
    BaseModel:
      title: BaseModel
      x-stoplight:
        id: 7s3ud4syrv0ys
      type: object
      description: Base model to be combined with all other models
      x-internal: true
      properties:
        id:
          type:
            - integer
          format: int64
          description: Autogenerated ID from the database.
          readOnly: true
        created:
          type: string
          format: date-time
          description: Datetime the model was created handled serverside.
        created_by:
          type: string
          description: Username the model was created by
        updated:
          type: string
          format: date-time
          description: Datetime the model was updated handled server side.
        updated_by:
          type: string
          description: Username the model was updated by
    User:
      allOf:
        - $ref: '#/components/schemas/BaseModel'
        - type: object
          properties:
            username:
              type: string
              maxLength: 64
              pattern: '^[A-Za-z0-9_-]+'
            password:
              type: string
              maxLength: 255
              format: password
            aesKey:
              type: string
              format: byte
            rsaPublicKey:
              type: string
              format: byte
            rsaPrivateKey:
              type: string
              format: byte
            firstName:
              type: string
              maxLength: 255
              pattern: '^[A-Za-z0-9 -]+'
            lastName:
              type: string
              maxLength: 255
              pattern: '^[A-Za-z0-9 -]+'
            email:
              type: string
              maxLength: 255
              format: email
            emailVerified:
              type: boolean
              default: false
            accountLocked:
              type: boolean
              default: true
            groups:
              type: array
              items:
                $ref: '#/components/schemas/Group'
          required:
            - username
            - password
            - aesKey
            - emailVerified
            - accountLocked
    Group:
      allOf:
        - $ref: '#/components/schemas/BaseModel'
        - type: object
          properties:
            name:
              type: string
              maxLength: 64
              pattern: '^[A-Za-z0-9 _.#-]+'
            description:
              type: string
              maxLength: 255
          required:
            - name
    Client:
      allOf:
        - $ref: '#/components/schemas/BaseModel'
        - type: object
          properties:
            name:
              type: string
              maxLength: 64
              pattern: '^[A-Za-z0-9 _.#-]+'
            description:
              type: string
          required:
            - name
    Location:
      allOf:
        - $ref: '#/components/schemas/BaseModel'
        - type: object
          properties:
            name:
              type: string
              maxLength: 64
              pattern: '^[A-Za-z0-9 _.#-]+'
            description:
              type: string
              maxLength: 255
            address1:
              type: string
              maxLength: 255
              pattern: '^[A-Za-z0-9 _.#-]+'
            address2:
              type: string
              maxLength: 255
              pattern: '^[A-Za-z0-9 _.#-]+'
            city:
              type: string
              maxLength: 64
              pattern: '^[A-Za-z0-9-_.]+'
            state:
              type: string
              maxLength: 2
              pattern: '^[A-Za-z ]+'
            zip:
              type: string
              maxLength: 12
              pattern: '^[A-Za-z0-9-]+'
            parent:
              $ref: '#/components/schemas/Location'
            client:
              $ref: '#/components/schemas/Client'
          required:
            - name
    LocationNew:
      title: LocationNew
      type: object
      description: Used for POST of a new location
      properties:
        name:
          type: string
          maxLength: 64
          pattern: '^[A-Za-z0-9 _.#-]+$'
        description:
          type: string
          maxLength: 255
        address1:
          type: string
          maxLength: 255
          pattern: '^[A-Za-z0-9 _.#-]+$'
        address2:
          type: string
          maxLength: 255
          pattern: '^[A-Za-z0-9 _.#-]+$'
        city:
          type: string
          maxLength: 64
          pattern: '^[A-Za-z0-9-_.]+$'
        state:
          type: string
          maxLength: 2
          pattern: '^[A-Za-z ]+$'
        zip:
          type: string
          maxLength: 12
          pattern: '^[A-Za-z0-9-]+$'
        parent:
          type: integer
          format: int64
        client:
          type: integer
          format: int64
      required:
        - name
    Room:
      allOf:
        - $ref: '#/components/schemas/BaseModel'
        - type: object
          properties:
            id:
              type: integer
              format: int64
              description: id autogenerated by the database
            name:
              type: string
              maxLength: 64
            number:
              type: string
              maxLength: 10
            description:
              type: string
              maxLength: 255
            floor:
              type: integer
              minimum: -10
              maximum: 255
            complete:
              type: boolean
              default: false
            active:
              type: boolean
              default: true
            location:
              $ref: '#/components/schemas/Location'
    Network:
      allOf:
        - $ref: '#/components/schemas/BaseModel'
        - type: object
          properties:
            name:
              type: string
              maxLength: 64
            description:
              type: string
              maxLength: 255
            base:
              type: string
              format: ipv4
            mask:
              type: string
              format: ipv4
            dns1:
              type: string
              format: ipv4
            dns2:
              type: string
              format: ipv4
    Device:
      allOf:
        - $ref: '#/components/schemas/BaseModel'
        - type: object
          properties:
            id:
              type: integer
              format: int64
              description: automatically assigned by database
            name:
              type: string
              maxLength: 64
            description:
              type: string
              maxLength: 255
            manufacturer:
              type: string
              maxLength: 64
            model:
              type: string
              maxLength: 64
            serial:
              type: string
              maxLength: 64
            installed:
              type: boolean
              default: false
            installedAt:
              type: string
              maxLength: 64
            room:
              $ref: '#/components/schemas/Room'
            configured:
              type: boolean
              default: false
            ipAddress1:
              type: string
              format: ipv4
            ipAddress2:
              type: string
              format: ipv4
            ipAddress3:
              type: string
              format: ipv4
            ipAddress4:
              type: string
              format: ipv4
            network1:
              $ref: '#/components/schemas/Network'
            network2:
              $ref: '#/components/schemas/Network'
            network3:
              $ref: '#/components/schemas/Network'
            network4:
              $ref: '#/components/schemas/Network'
            hostname1:
              type: string
              maxLength: 63
              pattern: '^[a-zA-Z0-9]([a-zA-Z0-9\-]{0,61}[a-zA-Z0-9])?$'
            hostname2:
              type: string
              maxLength: 63
              pattern: '^[a-zA-Z0-9]([a-zA-Z0-9\-]{0,61}[a-zA-Z0-9])?$'
            hostname3:
              type: string
              maxLength: 63
              pattern: '^[a-zA-Z0-9]([a-zA-Z0-9\-]{0,61}[a-zA-Z0-9])?$'
            hostname4:
              type: string
              maxLength: 63
              pattern: '^[a-zA-Z0-9]([a-zA-Z0-9\-]{0,61}[a-zA-Z0-9])?$'
            mac1:
              type: string
              pattern: '^([0-9A-Fa-f]{2}[:\-]){5}[0-9A-Fa-f]{2}$|^([0-9A-Fa-f]{4}\.){2}[0-9A-Fa-f]{4}$|^[0-9A-Fa-f]{12}$'
            mac2:
              type: string
              pattern: '^([0-9A-Fa-f]{2}[:\-]){5}[0-9A-Fa-f]{2}$|^([0-9A-Fa-f]{4}\.){2}[0-9A-Fa-f]{4}$|^[0-9A-Fa-f]{12}$'
            mac3:
              type: string
              pattern: '^([0-9A-Fa-f]{2}[:\-]){5}[0-9A-Fa-f]{2}$|^([0-9A-Fa-f]{4}\.){2}[0-9A-Fa-f]{4}$|^[0-9A-Fa-f]{12}$'
            mac4:
              type: string
              pattern: '^([0-9A-Fa-f]{2}[:\-]){5}[0-9A-Fa-f]{2}$|^([0-9A-Fa-f]{4}\.){2}[0-9A-Fa-f]{4}$|^[0-9A-Fa-f]{12}$'
            username1:
              type: string
              maxLength: 63
            username2:
              type: string
              maxLength: 63
            password1:
              type: string
            password2:
              type: string
            jack:
              type: string
              maxLength: 8
            switch:
              type: string
              maxLength: 64
            port:
              type: string
              maxLength: 8
            poeType:
              type: string
              enum:
                - 802.3af Type 1 15W
                - 802.3at Type 2 30W
                - 802.3bt Type 3 60W
                - 802.3bt Type 4 90W
              default: 802.3at Type 2 30W
            poeClass:
              type: string
              enum:
                - (0) 15.4W
                - (1) 4W
                - (2) 7W
                - (3) 15.4W
                - (4) 30W
                - (5) 45W
                - (6) 60W
                - (7) 75W
                - (8) 90W
            schematicLabel:
              type: string
              description: The label used for the device on the schemnatics.
            firmwareVersion:
              type: string
              description: The running firmware version.
            runningProgramDate:
              type: string
              format: date-time
              description: Current compile date/time
            ipID:
              type: string
              format: byte
              maxLength: 4
              description: Crestron IPID of the device
            serverPort1:
              type: integer
              maximum: 65535
              description: The port of any listening servers
            serverPort2:
              type: integer
              maximum: 65535
              description: The port of any listening servers.
          required:
            - name
  securitySchemes:
    access_token:
      name: API Key
      type: apiKey
      in: cookie
