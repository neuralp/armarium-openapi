openapi: 3.1.0
x-stoplight:
  id: ghx7kwq17g852
info:
  title: armarium
  version: '1.0'
  license:
    identifier: BSD-2-Clause
    name: BSD
  description: Interface to the Armarium Documentation Server API
  contact:
    name: Nicholas Pepper
servers:
- url: /api/v1
  description: Same origin server
paths:
  /token:
    post:
      summary: ''
      operationId: post-token
      responses:
        '200':
          description: OK
        '404':
          description: Not Found
      description: Authorization endopoint for acquiring the JWT token
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                username:
                  type: string
                  maxLength: 255
                  pattern: ^[A-Za-z_-]+
                password:
                  type: string
                  maxLength: 255
                  format: password
      parameters: []
      tags:
      - authentication
      security: []
  /users:
    get:
      summary: Get all users
      tags:
      - location
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  result:
                    type: string
                    enum:
                    - error
                    - success
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                required:
                - result
        '401':
          description: Unauthorized
      operationId: get-users
      description: Gets a list of all of the users on the server.
      parameters:
      - name: page
        in: query
        description: The page of results to return based on the limit.
        schema:
          type: integer
      - name: limit
        in: query
        description: The number of entries to return in a single query.
        schema:
          type: integer
          default: 500
          maximum: 1000.0
    parameters: []
  /user:
    post:
      summary: Create New User
      operationId: post-user
      responses:
        '200':
          description: User Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  result:
                    type: string
                    enum:
                    - error
                    - success
                  data:
                    $ref: '#/components/schemas/User'
        '400':
          description: Required information missing.
        '401':
          description: Unauthorized
        '409':
          description: Username already taken
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
        description: Post the necessary fields for the API to create a new user.
      description: Create a new user.
      tags:
      - user
  /user/{userId}:
    parameters:
    - name: userId
      in: path
      description: Username of an existing user
      required: true
      schema:
        type: string
    get:
      summary: Get User Info by User ID
      tags:
      - user
      responses:
        '200':
          description: User Found
