openapi: 3.1.0
x-stoplight:
  id: ghx7kwq17g852
info:
  title: armarium
  version: '1.0'
  license:
    identifier: BSD-2-Clause
    name: BSD
  description: Interface to the Armarium Documentation Server API
  contact:
    name: Nicholas Pepper
servers:
  - url: /api/v1
    description: Same origin server
paths:
  /token:
    post:
      summary: ''
      operationId: post-token
      responses:
        '200':
          description: OK
        '404':
          description: Not Found
      description: Authorization endopoint for acquiring the JWT token
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                username:
                  type: string
                  maxLength: 255
                  pattern: '^[A-Za-z_-]+'
                password:
                  type: string
                  maxLength: 255
                  format: password
      parameters: []
      tags:
        - authentication
      security: []
  /users:
    get:
      summary: Get all users
      tags:
        - location
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  result:
                    type: string
                    enum:
                      - success
                      - error
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                required:
                  - result
        '401':
          description: Unauthorized
      operationId: get-users
      description: Gets a list of all of the users on the server.
      parameters:
        - schema:
            type: integer
          in: query
          name: page
          description: The page of results to return based on the limit.
        - schema:
            type: integer
            maximum: 1000
            default: 500
          in: query
          name: limit
          description: The number of entries to return in a single query.
    parameters: []
  /user:
    post:
      summary: Create New User
      operationId: post-user
      responses:
        '200':
          description: User Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Required information missing.
        '401':
          description: Unauthorized
        '409':
          description: Username already taken
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
        description: Post the necessary fields for the API to create a new user.
      description: Create a new user.
      tags:
        - user
  '/user/{userId}':
    parameters:
      - schema:
          type: string
        name: userId
        in: path
        required: true
        description: Username of an existing user
    get:
      summary: Get User Info by User ID
      tags:
        - user
      responses:
        '200':
          description: User Found
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  result:
                    type: string
                    enum:
                      - error
                      - success
                  data:
                    $ref: '#/components/schemas/User'
                required:
                  - result
        '401':
          description: Unauthorized
        '404':
          description: User Not Found
      operationId: get-user-userId
      description: Retrieve the information of the user with the matching user ID.
    patch:
      summary: Update User Information
      operationId: patch-users-userId
      responses:
        '200':
          description: User Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  result:
                    type: string
                    enum:
                      - error
                      - success
                  data:
                    $ref: '#/components/schemas/User'
              examples: {}
        '401':
          description: Unauthorized
        '404':
          description: User Not Found
      description: Update the information of an existing user.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                password:
                  type: string
                  format: password
                aesKey:
                  type: string
                  format: byte
                rsaPublicKey:
                  type: string
                  format: byte
                rsaKeyPair:
                  type: string
                  format: byte
                firstName:
                  type: string
                  maxLength: 255
                lastName:
                  type: string
                  maxLength: 255
                email:
                  type: string
                  format: email
                accountLocked:
                  type: boolean
            examples: {}
        description: Patch user properties to update.
      tags:
        - user
  /clients:
    get:
      summary: Your GET endpoint
      tags:
        - client
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  result:
                    type: string
                    enum:
                      - success
                      - error
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Client'
                required:
                  - result
        '401':
          description: Unauthorized
      operationId: get-clients
      description: Gets a list of all of the clients on the server.
      parameters:
        - schema:
            type: integer
          in: query
          name: page
          description: The page of results to return based on the limit.
        - schema:
            type: integer
            maximum: 1000
            default: 500
          in: query
          name: limit
          description: The number of entries to return in a single query.
    parameters: []
  /client:
    post:
      summary: Create New User
      operationId: post-client
      responses:
        '200':
          description: User Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
        '400':
          description: Required information missing.
        '401':
          description: Unauthorized
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Client'
        description: Post the necessary fields for the API to create a new user.
      description: Create a new user.
      tags:
        - user
    parameters: []
  '/client/{clientId}':
    parameters:
      - schema:
          type: string
        name: clientId
        in: path
        required: true
    get:
      summary: Get User Info by User ID
      tags:
        - user
      responses:
        '200':
          description: User Found
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  result:
                    type: string
                    enum:
                      - error
                      - success
                  data:
                    $ref: '#/components/schemas/Client'
                required:
                  - result
        '401':
          description: Unauthorized
        '404':
          description: User Not Found
      operationId: get-client-clientId
      description: Retrieve the information of the user with the matching user ID.
    patch:
      summary: Update User Information
      operationId: patch-client-clientId
      responses:
        '200':
          description: User Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  result:
                    type: string
                  data:
                    $ref: '#/components/schemas/Client'
              examples: {}
        '401':
          description: Unauthorized
        '404':
          description: User Not Found
      description: Update the information of an existing user.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 255
        description: Patch user properties to update.
      tags:
        - user
  /locations:
    get:
      summary: Get all locations
      tags:
        - location
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  result:
                    type: string
                    enum:
                      - success
                      - error
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Location'
                required:
                  - result
        '401':
          description: Unauthorized
      operationId: get-locations
      description: Gets a list of all of the locations on the server.
      parameters:
        - schema:
            type: integer
          in: query
          name: page
          description: The page of results to return based on the limit.
        - schema:
            type: integer
            maximum: 1000
            default: 500
          in: query
          name: limit
          description: The number of entries to return in a single query.
    parameters: []
  /location:
    post:
      summary: Create New Location
      operationId: post-location
      responses:
        '200':
          description: Location Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Location'
        '400':
          description: Required information missing.
        '401':
          description: Unauthorized
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Location'
        description: Post the necessary fields for the API to create a new location.
      description: Create a new location.
      tags:
        - location
    parameters: []
  '/location/{locationId}':
    parameters:
      - schema:
          type: string
        name: locationId
        in: path
        required: true
        description: ID of an existing location
    get:
      summary: Get Location by Location ID
      tags:
        - location
      responses:
        '200':
          description: Location Found
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  result:
                    type: string
                    enum:
                      - error
                      - success
                  data:
                    $ref: '#/components/schemas/Location'
                required:
                  - result
        '401':
          description: Unauthorized
        '404':
          description: Location Not Found
      operationId: get-location-locationId
      description: Retrieve the information of the location with the matching location ID.
    patch:
      summary: Update Location Information
      operationId: patch-location-locationId
      responses:
        '200':
          description: Location Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  result:
                    type: string
                    enum:
                      - error
                      - success
                  data:
                    $ref: '#/components/schemas/Location'
              examples: {}
        '401':
          description: Unauthorized
        '404':
