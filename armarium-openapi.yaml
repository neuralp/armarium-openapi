      operationId: get-user-userId
      description: Retrieve the information of the user with the matching user ID.
    patch:
      summary: Update User Information
      operationId: patch-users-userId
      responses:
        '200':
          description: User Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  result:
                    type: string
                    enum:
                    - error
                    - success
                  data:
                    $ref: '#/components/schemas/User'
              examples: {}
        '401':
          description: Unauthorized
        '404':
          description: User Not Found
      description: Update the information of an existing user.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                password:
                  type: string
                  format: password
                aesKey:
                  type: string
                  format: byte
                rsaPublicKey:
                  type: string
                  format: byte
                rsaPrivateKey:
                  type: string
                  format: byte
                firstName:
                  type: string
                  maxLength: 255
                lastName:
                  type: string
                  maxLength: 255
                email:
                  type: string
                  format: email
                accountLocked:
                  type: boolean
            examples: {}
        description: Patch user properties to update.
      tags:
      - user
